services:
  web:
    env_file:
      - .env
    build: .
    command: >
      sh -c "uv run python manage.py wait_for_db &&
        uv run python manage.py makemigrations &&
        uv run python manage.py migrate &&
        uv run python manage.py collectstatic --noinput &&
        uv run gunicorn crm_for_yasya.wsgi:application --bind 0.0.0.0:\${PORT:-8000} --workers 3 --threads 3"
    ports:
      - "${PORT}:${PORT}"
    environment:
      - PYTHONUNBUFFERED=1

  qcluster:
    env_file:
      - .env
    build: .
    command: >
      sh -c "uv run python manage.py wait_for_db &&
        uv run python manage.py qcluster"
    environment:
      - PYTHONUNBUFFERED=1
    restart: always
    depends_on:
      - web
