services:
  app:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "
            uv run manage.py wait_for_db &&
            uv run manage.py makemigrations &&
            uv run manage.py migrate &&
            uv run gunicorn crm_for_yasya.wsgi:application --bind 0.0.0.0:8000 --workers 1 --threads 10"
