[build]
builder = "dockerfile"
dockerfilepath = "Dockerfile"

[services.web]
command = "sh -c 'uv run manage.py wait_for_db && uv run manage.py migrate && uv run manage.py collectstatic --noinput && uv run gunicorn crm_for_yasya.wsgi:application --bind 0.0.0.0:80 --workers 3 --threads 3'"

[services.qcluster]
command = "sh -c 'uv run manage.py wait_for_db && uv run manage.py qcluster'"
restartPolicy = "always"
