<div class="title">Новий урок</div>
<form method="post" action="?week={{ current_week_str }}">
  {% csrf_token %}
  <div class="form-group" style="flex-direction: row; align-items: center; gap: 10px; margin: 10px 0;">
    {{ form.is_blockout }}
    <label for="{{ form.is_blockout.id_for_label }}" style="cursor: pointer; font-size: 13px; color: var(--text)">
      🚫 Просто зайняти цей час (заглушка)
    </label>
  </div>
  <div class="form-group">
    <label>Студент</label>
    {{ form.student }}
  </div>
  <div class="form-group">
    <label>Дата та час</label>
    {{ form.datetime }}
  </div>
  <div class="form-group">
    <label>Тривалість (хв)</label>
    {{ form.duration }}
  </div>
  <button type="submit" class="btn">Додати до розкладу</button>
</form>
