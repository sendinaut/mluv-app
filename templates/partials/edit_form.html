<div class="title" style="color: var(--accent);">Редагувати урок</div>
<form method="post" action="{% url 'crm:edit_lesson' lesson.id %}?week={{ current_week_str }}">
  {% csrf_token %}
  <div class="form-group">
    <label>Студент</label>
    {{ form.student }}
  </div>
  <div class="form-group">
    <label>Дата та час</label>
    {{ form.datetime }}
  </div>
  <div class="form-group">
    <label>Тривалість (хв)</label>
    {{ form.duration }}
  </div>

  <button type="submit" class="btn">Зберегти зміни</button>

  <a href="{% url 'crm:delete_lesson' lesson.id %}?week={{ current_week_str }}"
     class="btn btn-danger"
     onclick="return confirm('Ви впевнені, що хочете видалити цей урок?');">
     Видалити урок
  </a>

  <button type="button"
          class="btn btn-secondary"
          hx-get="{% url 'crm:get_create_form' %}?week={{ current_week_str }}"
          hx-target="#lesson-form-container">
          Скасувати
  </button>
</form>
